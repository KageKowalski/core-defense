<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Core Defense</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #0a0a0f;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #game-container canvas {
        display: block;
      }

      /* UI Overlay */
      #ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      #ui-overlay > * {
        pointer-events: auto;
      }

      /* HUD - Top Bar */
      .hud {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        padding: 12px 20px;
        background: rgba(0, 0, 0, 0.7);
        gap: 30px;
      }

      .gold-display {
        color: #ffd700;
        font-size: 18px;
        font-weight: bold;
      }

      .wave-display {
        color: #88ccff;
        font-size: 16px;
        font-weight: bold;
      }

      .enemies-display {
        color: #ff6666;
        font-size: 16px;
      }

      /* Shop Panel */
      .shop-panel {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.8);
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .shop-item {
        padding: 10px 16px;
        background: rgba(50, 50, 80, 0.9);
        color: #ffffff;
        border: 2px solid rgba(100, 100, 200, 0.5);
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.15s;
      }

      .shop-item:hover {
        background: rgba(70, 70, 120, 0.9);
        border-color: rgba(150, 150, 255, 0.8);
      }

      .shop-item.selected {
        background: rgba(50, 100, 200, 0.9);
        border-color: #4488ff;
        box-shadow: 0 0 10px rgba(68, 136, 255, 0.5);
      }

      .shop-item.unaffordable {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Start Wave Button */
      .start-wave-btn {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 30px;
        background: linear-gradient(135deg, #22aa44, #118833);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.15s;
      }

      .start-wave-btn:hover {
        background: linear-gradient(135deg, #33cc55, #22aa44);
        transform: translateX(-50%) scale(1.05);
      }

      /* Game Over Overlay */
      .game-over-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.85);
        gap: 20px;
      }

      .game-over-overlay h1 {
        font-size: 48px;
        text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
      }

      .game-over-overlay p {
        color: #cccccc;
        font-size: 20px;
      }

      .restart-btn {
        padding: 12px 40px;
        background: linear-gradient(135deg, #4488ff, #2266dd);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.15s;
      }

      .restart-btn:hover {
        background: linear-gradient(135deg, #66aaff, #4488ff);
        transform: scale(1.05);
      }

      /* Context Menu */
      .context-menu {
        position: absolute;
        background: rgba(20, 20, 40, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        padding: 12px;
        min-width: 150px;
        z-index: 100;
      }

      .context-title {
        color: #ffffff;
        font-weight: bold;
        font-size: 14px;
        margin-bottom: 6px;
        text-align: center;
      }

      .context-health {
        color: #aaaaaa;
        font-size: 12px;
        margin-bottom: 10px;
        text-align: center;
      }

      .context-btn {
        display: block;
        width: 100%;
        padding: 8px 12px;
        margin-bottom: 6px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .sell-btn {
        background: rgba(200, 150, 0, 0.8);
        color: white;
      }

      .sell-btn:hover {
        background: rgba(220, 170, 0, 0.9);
      }

      .repair-btn {
        background: rgba(0, 150, 50, 0.8);
        color: white;
      }

      .repair-btn:hover {
        background: rgba(0, 180, 60, 0.9);
      }

      .repair-btn.unaffordable {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .close-btn {
        background: rgba(80, 80, 80, 0.8);
        color: #cccccc;
      }

      .close-btn:hover {
        background: rgba(100, 100, 100, 0.9);
      }

      /* Floating Text (rendered via CSS2DRenderer) */
      .floating-text {
        font-size: 14px;
        font-weight: bold;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        user-select: none;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="ui-overlay"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
